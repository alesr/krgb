name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Lint
        run: go vet ./...

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOARCH=amd64 go build -o dist/krgb_darwin_amd64 .
          CGO_ENABLED=1 GOARCH=arm64 go build -o dist/krgb_darwin_arm64 .

      - name: Package
        run: |
          TAG="${{ github.ref_name }}"
          cd dist
          tar czf "krgb_${TAG}_darwin_amd64.tar.gz" krgb_darwin_amd64
          tar czf "krgb_${TAG}_darwin_arm64.tar.gz" krgb_darwin_arm64

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/*.tar.gz --generate-notes

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SHA256_AMD64=$(shasum -a 256 "dist/krgb_${TAG}_darwin_amd64.tar.gz" | cut -d' ' -f1)
          SHA256_ARM64=$(shasum -a 256 "dist/krgb_${TAG}_darwin_arm64.tar.gz" | cut -d' ' -f1)

          cat > Formula/krgb.rb << EOF
          class Krgb < Formula
            desc "TUI for controlling Keychron K-series keyboard LED colors via raw HID"
            homepage "https://github.com/alesr/krgb"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/alesr/krgb/releases/download/${TAG}/krgb_${TAG}_darwin_arm64.tar.gz"
                sha256 "${SHA256_ARM64}"
              else
                url "https://github.com/alesr/krgb/releases/download/${TAG}/krgb_${TAG}_darwin_amd64.tar.gz"
                sha256 "${SHA256_AMD64}"
              end
            end

            license "MIT"

            def install
              bin.install "krgb_darwin_#{Hardware::CPU.arch}" => "krgb"
            end

            test do
              assert_predicate bin/"krgb", :exist?
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/krgb.rb
          git commit -m "Update formula for ${TAG} [skip ci]"
          git push origin HEAD:main
